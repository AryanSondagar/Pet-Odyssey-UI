<div class="forms">
    <div class="form-content">

      <div class="login-form">
        <div class="title">Login</div>
      <form >
        <div class="input-boxes">

          <div class="input-box">
            <!-- <fa-icon [icon]="email"></fa-icon> -->
            <input type="email" placeholder="Enter your email" required  name="UserEmail" ngModel
            #UserEmail="ngModel" required email>
          </div>

          <div class="input-box">
                    <!-- <fa-icon [icon]="lock"></fa-icon> -->
            <input type="password" placeholder="Enter your password" required name="UserPassword" ngModel
            #UserPassword="ngModel" required minlength="6" maxlength="16">
          </div>

          <!-- <div class="text"><a>{{authError}}</a></div>  -->

          <div class="button input-box">
            <input type="submit" value="Sumbit">
          </div>

          <div class="text sign-up-text">Don't have an account? <label for="flip">Sigup now</label></div>
        </div>
    </form>
  </div>
    </div>
    </div>
