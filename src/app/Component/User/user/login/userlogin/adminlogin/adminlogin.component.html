
<div class="adminlogin">
<div class="container">

    <div class="cover">
      <div class="front">
        <img src="https://helios-i.mashable.com/imagery/articles/03xrF9kkxvucwQ4Ei4Ag6cu/hero-image.fill.size_1248x702.v1646058414.jpg" alt="" />
        <div class="text">
          <span class="text-1">Welcome back admin!</span>
        </div>
      </div>
    </div>
    
    <div class="forms">
      <div class="form-content">
        <div class="login-form">
          <div class="title">Login</div>
          <form #AdminLogIn="ngForm" (ngSubmit)="adminLogin(AdminLogIn.value)">
            <div class="input-boxes">
              <div class="input-box">
                <fa-icon [icon]="email"></fa-icon>
                <input type="text" placeholder="Enter your email"   type="email" placeholder="Enter your email"   name="AdminEmail" ngModel
                #UserEmail="ngModel" required email [(ngModel)]="useremail"/>
              </div>
              <div class="input-box">
                <fa-icon [icon]="lock"></fa-icon>
                <input
                type="password" placeholder="Enter your password" required name="AdminPassword" [(ngModel)]="password"
                #UserPassword="ngModel"  minlength="6" maxlength="16"
                />
              </div>
             
              <div class="button input-box">
                <input type="submit" value="Sumbit" />
              </div>
            </div>
          </form>
        </div>
    </div>

  </div>
  </div>
