<div class="container">


    <div class="title">
        <h1 class="animated-title"> <mat-icon>pets</mat-icon> Add Product Detail <mat-icon>pets</mat-icon></h1>
    </div>
    <form #addProduct="ngForm" (ngSubmit)="submit(addProduct.value)">
        <div class="add-product-form">
            <div class="top-field">
                <div class="name">
                    <mat-form-field fill="outline">
                        <mat-label>Product Name</mat-label>
                        <input matInput placeholder="Enter product title" name="ProductName" required #name="ngModel"
                            [(ngModel)]="newProduct.ProductName">
                    </mat-form-field>
                    <!-- <mat-error *ngIf="name.invalid&&name.touched" class="notice">*Required</mat-error>  -->
                </div>
                <div class="category name">
                    <mat-form-field class="product-field">
                        <mat-label>Product Category</mat-label>
                        <mat-select name="ProductCategory" [(ngModel)]="newProduct.ProductCategory" required>
                            <mat-option value="Food&Treats">Food&Treats</mat-option>
                            <mat-option value="Toys">Toys</mat-option>
                            <mat-option value="Collars, Leashes, & Harnesses">Collars, Leashes, &
                                Harnesses</mat-option>
                            <mat-option value="Grooming Supplies"> Grooming Supplies</mat-option>
                            <mat-option value="Feeding & Watering Supplies">Feeding & Watering Supplies</mat-option>
                            <mat-option value="Health & Wellness Products">Health & Wellness Products</mat-option>
                            <mat-option value="ID Tags & Accessories">ID Tags & Accessories</mat-option>
                            <mat-option value="Travel Accessories">Travel Accessories</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>

            <div class="middle-field">
                <div class="product-price name">
                    <mat-form-field>
                        <mat-label>Enter Price (INR)</mat-label>
                        <input matInput type="number" placeholder="Enter price in INR" min="0" name="ProductPrice"
                            [(ngModel)]="newProduct.ProductPrice" required>
                    </mat-form-field>
                </div>
                <div class="product-stock name">
                    <mat-form-field>
                        <mat-label>Product Stock</mat-label>
                        <input matInput placeholder="*In Stock" type="number" min="0" name="ProductStock"
                            [(ngModel)]="newProduct.ProductStock" required>
                    </mat-form-field>
                </div>
            </div>
            <div class="desc name">

                <label for="myTextArea">Description:</label>
                <textarea id="myTextArea" name="message" placeholder="Type your text here..." [(ngModel)]="newProduct.ProductDes"
                    required></textarea>
            </div>

            <div class="upload-image name">
                <div class="upload-container" fxLayout="column" fxLayoutAlign="center center">
                    <input type="file" (change)="handleFileInput($event)" accept="image/*" multiple name="ProductImages"
                        [(ngModel)]="newProduct.ProductImage" required id="file-input">
                    <label for="file-input" style="max-width: 260px;" mat-raised-button
                        matTooltip="Image must be less then 5" [matTooltipPosition]="position.value!">
                        <mat-icon>upload</mat-icon>
                        Choose Files To Upload
                    </label>

                    <div class="upload-preview" *ngIf="imageUrls && imageUrls.length > 0">
                        <div class="product-image" *ngFor="let imageUrl of imageUrls">
                            <img [src]="imageUrl" alt="Uploaded Image" />
                        </div>
                    </div>

                </div>
            </div>
            <div class="submit-btn">
                <button mat-raised-button color="primary" type="submit" [disabled]="addProduct.invalid"
                    (click)="clear()">Submit Product
                    Detail</button>

            </div>
        </div>
    </form>




</div>
