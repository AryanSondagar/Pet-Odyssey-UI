<h1 class="title">Add Product Detail</h1>

<mat-card-content>
    <div class="row">
        <div class="col">
            <mat-form-field appearance="outline" class="product-name">
                <mat-label>Product Name</mat-label>
                <input matInput placeholder="Enter Product Name">
            </mat-form-field>
        </div>
        <div class="col">
            <mat-form-field appearance="outline" class="product-price">
                <mat-label>Product Price(₹)</mat-label>
                <input matInput type="number" placeholder="0" class="price-input">
            </mat-form-field>
        </div>
    </div>
    <mat-form-field appearance="outline">
        <mat-label>Product Category</mat-label>
        <input matInput placeholder="Enter Product Name">
    </mat-form-field>

</mat-card-content>
