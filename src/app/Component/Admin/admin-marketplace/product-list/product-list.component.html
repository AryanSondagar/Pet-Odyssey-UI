<div class="container">
    <div class="title">
        <h1 class="animated-title"> <mat-icon>pets</mat-icon> All Product List <mat-icon>pets</mat-icon></h1>
    </div>

    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort  *ngIf="dataSource">
    
        <!-- ID Column -->
        <ng-container matColumnDef="productName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Name </th>
          <td mat-cell *matCellDef="let row"> {{row.productName}} </td>
        </ng-container>
    
        <!-- Progress Column -->
        <ng-container matColumnDef="productCategory">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Category </th>
          <td mat-cell *matCellDef="let row"> {{row.productCategory}} </td>
        </ng-container>
    
        <!-- Name Column -->
        <ng-container matColumnDef="productPrice">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Price </th>
          <td mat-cell *matCellDef="let row"> {{row.productPrice}} </td>
        </ng-container>
    
        <!-- Fruit Column -->
        <ng-container matColumnDef="productStock">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> *In stock </th>
          <td mat-cell *matCellDef="let row"> {{row.productStock }} </td>
        </ng-container>

        <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="warn" (click)="onDelete(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
        <!-- Row shown when there is no matching data. -->
       
      </table>
    
      <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
    </div>
    
    
      
</div>
