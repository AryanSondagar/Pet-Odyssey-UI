<div class="container">
    <div class="title">
        <h1 class="animated-title"> <mat-icon>pets</mat-icon> Pet Detail <mat-icon>pets</mat-icon></h1>
    </div>


    <form #PetAdoption="ngForm" (ngSubmit)="submitForm()">

        <div class="adoption-form">

            <div class="top-field">
                <div class="pet-name">
                    <mat-form-field>
                        <mat-label>Pet Name</mat-label>
                        <input matInput placeholder="Enter pet name" [(ngModel)]="adoptionForm.petName" name="petName"
                            required>
                    </mat-form-field>
                </div>
                <div class="pet-breed">
                    <mat-form-field>
                        <mat-label>Pet Breed</mat-label>
                        <input matInput placeholder="Like bulldog,Birman" [(ngModel)]="adoptionForm.petBreed"
                            name="petBreed" required />
                    </mat-form-field>
                </div>
            </div>

            <div class="middle-field">
                <div class="pet-category">
                    <mat-form-field class="product-field">
                        <mat-label>Pet Category</mat-label>
                        <mat-select [(ngModel)]="adoptionForm.petCategory" name="petCategory" required>
                            <mat-option value="Dog">Dog</mat-option>
                            <mat-option value="Cat">Cat</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="pet-age">
                    <mat-form-field>
                        <mat-label>Pet Age</mat-label>
                        <input matInput placeholder="Pet Age *In Month" type="number" min="0" max="999"
                            [(ngModel)]="adoptionForm.petAge" name="petAge" required />
                        <mat-hint>*In Month</mat-hint>
                    </mat-form-field>
                </div>
            </div>

            <div class="bottom-field">
                <div class="pet-price">
                    <mat-form-field>
                        <mat-label>Pet Selling Price(INR)</mat-label>
                        <input matInput type="number" placeholder="Enter price in INR" min="0" max="999999"
                            name="PetPrice" [(ngModel)]="adoptionForm.petSellingPrice" name="petSellingPrice"
                            required />
                    </mat-form-field>
                </div>

                <div class="owner-MobileNumber">
                    <mat-form-field>
                        <mat-label>Owner Mobile Number</mat-label>
                        <input type="tel" matInput placeholder="Enter Mobile Number" maxlength="10" [(ngModel)]="adoptionForm.owner_MobileNumber"
                            name="owner_MobileNumber" required />
                    </mat-form-field>
                </div>
            </div>

            <div *ngIf="selectedFiles.length >= 5" class="text-danger small">
                You can only upload up to 5 images.
            </div>

            <div class="mb-3 d-flex justify-content-center">
                <div class="upload-wrapper">
                    <input type="file" (change)="onFileSelected($event)" multiple class="form-control" [attr.maxlength]="5"   />
                </div>
            </div>

            <div class="preview-box mb-3 d-flex ">
                <ng-container *ngIf="selectedFiles.length > 0; else noImage">
                    <div *ngFor="let file of selectedFiles" class="p-2">
                        <img [src]="file.preview" alt="preview" width="70" height="70" class="rounded" />
                    </div>
                </ng-container>
                <!-- Placeholder if no images -->
                <ng-template #noImage>
                    <span class="placeholder-text">No images uploaded</span>
                </ng-template>
            </div>


            <div class="example-button-row center col">
                <button mat-raised-button color="primary" [disabled]="PetAdoption.invalid">Confirm Course</button>
            </div>

        </div>
    </form>
</div>
