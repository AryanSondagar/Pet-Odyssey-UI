<div class="container">

  <div class="title">
    <h1 class="animated-title"> <mat-icon>pets</mat-icon> Add pet course <mat-icon>pets</mat-icon></h1>
  </div>
  <form [formGroup]="courseForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
        <div class="add-product-form">
            <div class="top-field">
                <div class="name">
                    <mat-form-field fill="outline">
                        <mat-label>City</mat-label>
                        <input matInput placeholder="Enter Course City" name="ProductName"
                            formControlName="city" required>
                    </mat-form-field>
                </div>

                <div class="name">
                    <mat-form-field fill="outline">
                        <mat-label>State</mat-label>
                        <input matInput placeholder="Enter Course State" name="ProductName"
                            formControlName="state" required>
                    </mat-form-field>
                </div>
            </div>

            <div class="middle-field">
                <div class="Date name">
                    <mat-form-field fill="outline">
                        <mat-label>Date of Course</mat-label>
                        <input matInput placeholder="Enter product title" name="ProductName"
                            formControlName="courseDate" required>
                    </mat-form-field>
                </div>

                <div class="name">
                    <mat-form-field fill="outline">
                        <mat-label>Price</mat-label>
                        <input matInput placeholder="Enter product title" name="ProductName"
                            formControlName="price" required>
                    </mat-form-field>
                </div>
            </div>

            <div class="pet-category name">
                    <mat-form-field class="product-field">
                        <mat-label>Course Category</mat-label>
                        <mat-select  formControlName="category" placeholder="example.ca" name="petCategory" required>
                            <mat-option value="Dog">Dog</mat-option>
                            <mat-option value="Cat">Cat</mat-option>
                            <mat-option value="Observer">Cat</mat-option>
                        </mat-select>
                    </mat-form-field>
            </div>

        </div>
  </form>
</div>
